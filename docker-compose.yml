version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: pipeline_monitor_db
    environment:
      POSTGRES_DB: pipeline_monitor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pipeline_monitor_api
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/pipeline_monitor
      DEBUG: "false"
      API_PORT: 8000
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: pipeline_monitor_ui
    environment:
      API_URL: http://backend:8000/api
    ports:
      - "8501:8501"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app/frontend

volumes:
  postgres_data:

networks:
  default:
    name: pipeline_monitor_network
